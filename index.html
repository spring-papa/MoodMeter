<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFD700">
    <title>Mood Meter</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- PWA Icons and Manifest -->
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mood Meter">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <header id="header">
            <button id="back-btn" class="back-btn hidden" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1 id="header-title">Mood Meter</h1>
        </header>

        <main id="main-content">
            <!-- Content will be rendered here -->
        </main>

        <nav id="tab-bar" role="tablist" aria-label="감정 카테고리">
            <button class="tab-btn" data-tab="yellow" role="tab" aria-selected="true">노랑</button>
            <button class="tab-btn" data-tab="green" role="tab" aria-selected="false">초록</button>
            <button class="tab-btn" data-tab="blue" role="tab" aria-selected="false">파랑</button>
            <button class="tab-btn" data-tab="red" role="tab" aria-selected="false">빨강</button>
            <button class="tab-btn" data-tab="settings" role="tab" aria-selected="false">설정</button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
