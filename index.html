<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFD700">
    <title>Mood Meter</title>
    <link rel="stylesheet" href="css/styles.css?v=21">

    <!-- PWA Icons and Manifest -->
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mood Meter">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <header id="header">
            <button id="back-btn" class="back-btn hidden" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <button id="quiz-btn" class="quiz-header-btn" aria-label="퀴즈">
                Quiz
            </button>
            <h1 id="header-title">Mood Meter</h1>
            <button id="settings-btn" class="settings-header-btn" aria-label="설정">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8.92 4a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.31.49 1 1.51 1H21a2 2 0 0 1 0 4h-.09c-1.02 0-1.37.69-1.51 1z"/>
                </svg>
            </button>
        </header>

        <main id="main-content">
            <!-- Content will be rendered here -->
        </main>

        <nav id="tab-bar" role="tablist" aria-label="감정 카테고리">
            <button class="tab-btn" data-tab="discover" role="tab" aria-selected="false">알아가기</button>
            <button class="tab-btn" data-tab="yellow" role="tab" aria-selected="true">노랑</button>
            <button class="tab-btn" data-tab="green" role="tab" aria-selected="false">초록</button>
            <button class="tab-btn" data-tab="blue" role="tab" aria-selected="false">파랑</button>
            <button class="tab-btn" data-tab="red" role="tab" aria-selected="false">빨강</button>
        </nav>
    </div>

    <script src="js/app.js?v=21"></script>
</body>
</html>
